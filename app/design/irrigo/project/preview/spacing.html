<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 22px 24px; }
  .lbl { font: var(--num-sm); color: var(--fg-dim); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 14px; }
  .row { display: flex; align-items: flex-end; gap: 14px; }
  .item { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .item .blk { background: var(--accent); border-radius: 4px; }
  .item .nm { font: var(--num-sm); color: var(--fg); }
  .item .px { font: var(--num-sm); color: var(--fg-dim); }
</style>
</head>
<body class="card">
  <div class="lbl">Spacing — 4px grid · s-1 → s-9</div>
  <div class="row">
    <div class="item"><div class="blk" style="width:4px;height:24px"></div><div class="nm">s-1</div><div class="px">4</div></div>
    <div class="item"><div class="blk" style="width:8px;height:24px"></div><div class="nm">s-2</div><div class="px">8</div></div>
    <div class="item"><div class="blk" style="width:12px;height:24px"></div><div class="nm">s-3</div><div class="px">12</div></div>
    <div class="item"><div class="blk" style="width:16px;height:24px"></div><div class="nm">s-4</div><div class="px">16</div></div>
    <div class="item"><div class="blk" style="width:20px;height:24px"></div><div class="nm">s-5</div><div class="px">20</div></div>
    <div class="item"><div class="blk" style="width:24px;height:24px"></div><div class="nm">s-6</div><div class="px">24</div></div>
    <div class="item"><div class="blk" style="width:32px;height:24px"></div><div class="nm">s-7</div><div class="px">32</div></div>
    <div class="item"><div class="blk" style="width:40px;height:24px"></div><div class="nm">s-8</div><div class="px">40</div></div>
    <div class="item"><div class="blk" style="width:48px;height:24px"></div><div class="nm">s-9</div><div class="px">48</div></div>
    <div class="item"><div class="blk" style="width:64px;height:24px"></div><div class="nm">s-10</div><div class="px">64</div></div>
  </div>
</body></html>
