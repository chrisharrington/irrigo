<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 22px 24px; }
  .lbl { font: var(--num-sm); color: var(--fg-dim); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 14px; }
  .strip {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--r-3);
    padding: 14px 18px 16px;
  }

  /* legend */
  .legend {
    display: flex; flex-wrap: wrap; gap: 16px;
    margin-bottom: 10px;
    font: var(--num-sm);
  }
  .legend .item { display: inline-flex; align-items: center; gap: 8px; }
  .legend .sw { width: 10px; height: 10px; border-radius: 4px; }
  .legend .sw.north { background: #6FE39B; box-shadow: 0 0 8px rgba(111,227,155,0.5); }
  .legend .sw.south { background: #7CD4FB; box-shadow: 0 0 8px rgba(124,212,251,0.4); }
  .legend .nm { color: var(--fg); font: 500 12px/1 var(--font-body); }
  .legend .mu { color: var(--fg-muted); }

  /* time axis */
  .axis { position: relative; height: 16px; margin-bottom: 4px; }
  .axis .t {
    position: absolute; top: 0;
    font: var(--num-sm); color: var(--fg-dim);
    font-feature-settings: "tnum";
    white-space: nowrap;
  }
  .axis .t.mid { transform: translateX(-50%); }
  .axis .t.right { transform: translateX(-100%); }
  .axis .t .colon { opacity: .5; }

  /* plot */
  .plot {
    position: relative;
    padding: 10px 0;
    border-top: 1px solid var(--hairline);
    border-bottom: 1px solid var(--hairline);
    background: linear-gradient(90deg, rgba(216,198,144,0.05) 0%, transparent 12%, transparent 88%, rgba(216,198,144,0.05) 100%);
  }
  .plot .grid { position: absolute; top: 0; bottom: 0; width: 1px; background: var(--hairline); opacity: .55; }
  .plot .sun-line {
    position: absolute; top: 0; bottom: 0; width: 1px;
    background: linear-gradient(to bottom, transparent, var(--moon-500), transparent);
    opacity: .55;
  }
  .lane { position: relative; height: 20px; }
  .lane + .lane { margin-top: 8px; }
  .lane .wash { position: absolute; inset: 0; border-radius: 4px; opacity: .55; }
  .lane[data-tone="north"] .wash { background: linear-gradient(to right, transparent, rgba(111,227,155,0.07) 30%, rgba(111,227,155,0.07) 70%, transparent); }
  .lane[data-tone="south"] .wash { background: linear-gradient(to right, transparent, rgba(124,212,251,0.07) 30%, rgba(124,212,251,0.07) 70%, transparent); }
  .lane .pulse {
    position: absolute; top: 0; bottom: 0; border-radius: 4px;
  }
  .lane[data-tone="north"] .pulse {
    background: #6FE39B;
    box-shadow: 0 0 10px rgba(111,227,155,0.5), inset 0 1px 0 rgba(255,255,255,0.22);
  }
  .lane[data-tone="south"] .pulse {
    background: #7CD4FB;
    box-shadow: 0 0 10px rgba(124,212,251,0.4), inset 0 1px 0 rgba(255,255,255,0.22);
  }

  /* sun labels */
  .sun-labels { position: relative; height: 16px; margin-top: 6px; }
  .sun-labels .sun {
    position: absolute; top: 0;
    display: inline-flex; align-items: center; gap: 5px;
    font: var(--num-sm); color: var(--moon-500);
    font-feature-settings: "tnum";
    white-space: nowrap;
  }
  .sun-labels .sun.right { transform: translateX(-100%); }
</style>
</head>
<body class="card">
  <div class="lbl">Cycle sequence — tonight, 22:08 → 05:48</div>
  <div class="strip">
    <!-- Legend -->
    <div class="legend">
      <span class="item"><span class="sw north"></span><span class="nm">North</span><span class="mu">· 6 cycles · 90 min</span></span>
      <span class="item"><span class="sw south"></span><span class="nm">South</span><span class="mu">· 4 cycles · 56 min</span></span>
    </div>

    <!-- time axis: 22, 23, 00, 01, 02, 03, 04, 05, 06 (8h window from 22:00) -->
    <div class="axis">
      <span class="t" style="left: 0%">22<span class="colon">:00</span></span>
      <span class="t mid" style="left: 12.5%">23<span class="colon">:00</span></span>
      <span class="t mid" style="left: 25%">00<span class="colon">:00</span></span>
      <span class="t mid" style="left: 37.5%">01<span class="colon">:00</span></span>
      <span class="t mid" style="left: 50%">02<span class="colon">:00</span></span>
      <span class="t mid" style="left: 62.5%">03<span class="colon">:00</span></span>
      <span class="t mid" style="left: 75%">04<span class="colon">:00</span></span>
      <span class="t mid" style="left: 87.5%">05<span class="colon">:00</span></span>
      <span class="t right" style="left: 100%">06<span class="colon">:00</span></span>
    </div>

    <div class="plot">
      <!-- hour grid -->
      <div class="grid" style="left: 0%"></div>
      <div class="grid" style="left: 12.5%"></div>
      <div class="grid" style="left: 25%"></div>
      <div class="grid" style="left: 37.5%"></div>
      <div class="grid" style="left: 50%"></div>
      <div class="grid" style="left: 62.5%"></div>
      <div class="grid" style="left: 75%"></div>
      <div class="grid" style="left: 87.5%"></div>
      <div class="grid" style="left: 100%"></div>

      <!-- sun lines: sunset 22:08 → 1.67%, sunrise 05:48 → 97.5% -->
      <div class="sun-line" style="left: 1.67%"></div>
      <div class="sun-line" style="left: 97.5%"></div>

      <!-- North: 6 × 15min starting 22:25, 23:30, 00:35, 01:40, 02:45, 03:50
           Minutes from 22:00: 25, 90, 155, 220, 285, 350
           As % of 480min: 5.2, 18.75, 32.3, 45.83, 59.4, 72.9. Width: 3.125% -->
      <div class="lane" data-tone="north">
        <div class="wash"></div>
        <div class="pulse" style="left: 5.2%; width: 3.125%"></div>
        <div class="pulse" style="left: 18.75%; width: 3.125%"></div>
        <div class="pulse" style="left: 32.3%; width: 3.125%"></div>
        <div class="pulse" style="left: 45.83%; width: 3.125%"></div>
        <div class="pulse" style="left: 59.4%; width: 3.125%"></div>
        <div class="pulse" style="left: 72.9%; width: 3.125%"></div>
      </div>

      <!-- South: 4 × 14min starting 04:15, 04:42, 05:09, 05:34
           Minutes from 22:00: 375, 402, 429, 454. %: 78.13, 83.75, 89.38, 94.58. Width: 2.92% -->
      <div class="lane" data-tone="south">
        <div class="wash"></div>
        <div class="pulse" style="left: 78.13%; width: 2.92%"></div>
        <div class="pulse" style="left: 83.75%; width: 2.92%"></div>
        <div class="pulse" style="left: 89.38%; width: 2.92%"></div>
        <div class="pulse" style="left: 94.58%; width: 2.92%"></div>
      </div>
    </div>

    <div class="sun-labels">
      <span class="sun" style="left: 1.67%">
        <svg width="13" height="9" viewBox="0 0 13 9" fill="none">
          <path d="M1.5 8 a 5 5 0 0 1 10 0 Z" fill="currentColor" opacity=".85"/>
          <line x1="0" y1="8.5" x2="13" y2="8.5" stroke="currentColor" stroke-width=".8" opacity=".6"/>
          <path d="M6.5 2.5 v 3 M5 4 l 1.5 1.5 l 1.5 -1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
        sunset 22:08
      </span>
      <span class="sun right" style="left: 97.5%">
        sunrise 05:48
        <svg width="13" height="9" viewBox="0 0 13 9" fill="none">
          <path d="M1.5 8 a 5 5 0 0 1 10 0 Z" fill="currentColor" opacity=".85"/>
          <line x1="0" y1="8.5" x2="13" y2="8.5" stroke="currentColor" stroke-width=".8" opacity=".6"/>
          <path d="M6.5 5.5 v -3 M5 4 l 1.5 -1.5 l 1.5 1.5" stroke="currentColor" stroke-width="1" stroke-linecap="round" fill="none"/>
        </svg>
      </span>
    </div>
  </div>
</body></html>
