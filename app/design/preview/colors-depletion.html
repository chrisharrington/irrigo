<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 22px 24px; }
  .lbl { font: var(--num-sm); color: var(--fg-dim); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 14px; }
  .ramp { display: flex; gap: 2px; border-radius: var(--r-2); overflow: hidden; height: 36px; border: 1px solid var(--border); }
  .ramp .step { flex: 1; }
  .axis { display: flex; justify-content: space-between; margin-top: 8px; font: var(--num-sm); color: var(--fg-muted); }
  .legend { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; margin-top: 16px; }
  .legend .it { display: flex; gap: 10px; align-items: center; }
  .legend .sw { width: 22px; height: 22px; border-radius: 4px; }
  .legend .t1 { font: var(--label); }
  .legend .t2 { font: var(--num-sm); color: var(--fg-muted); }
</style>
</head>
<body class="card">
  <div class="lbl">Depletion ramp — the soil-moisture battery</div>
  <div class="ramp">
    <div class="step" style="background:#6FE39B"></div>
    <div class="step" style="background:#9CE093"></div>
    <div class="step" style="background:#C8DD7B"></div>
    <div class="step" style="background:#E9C96D"></div>
    <div class="step" style="background:#FFBE6B"></div>
    <div class="step" style="background:#FF9B6F"></div>
    <div class="step" style="background:#FF6B7B"></div>
  </div>
  <div class="axis">
    <span>0 mm · saturated</span>
    <span style="color:var(--warn)">RAW notch</span>
    <span style="color:var(--danger)">past RAW · queued</span>
  </div>
  <div class="legend">
    <div class="it"><div class="sw" style="background:#6FE39B"></div><div><div class="t1">Saturated</div><div class="t2">0 → ~40% RAW</div></div></div>
    <div class="it"><div class="sw" style="background:#FFBE6B"></div><div><div class="t1">Approaching</div><div class="t2">~80% → 100% RAW</div></div></div>
    <div class="it"><div class="sw" style="background:#FF6B7B"></div><div><div class="t1">Queued</div><div class="t2">past RAW → runs tonight</div></div></div>
  </div>
</body></html>
