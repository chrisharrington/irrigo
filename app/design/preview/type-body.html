<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 22px 28px; }
  .row { display: flex; align-items: baseline; justify-content: space-between; gap: 24px; padding: 6px 0; border-bottom: 1px solid var(--hairline); }
  .row:last-child { border-bottom: 0; }
  .tok { font: var(--num-sm); color: var(--fg-dim); white-space: nowrap; }
  .lbl { font: var(--num-sm); color: var(--fg-dim); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 12px; }
</style>
</head>
<body class="card">
  <div class="lbl">Body / UI — Geist</div>
  <div class="row"><div class="h1">North zone, 320 m² fescue</div><div class="tok">h1 / 22 · 600</div></div>
  <div class="row"><div class="h2">Recent runs</div><div class="tok">h2 / 18 · 600</div></div>
  <div class="row"><div class="body-lg">Tonight 6 cycles, ending 5:48 am.</div><div class="tok">body-lg / 16 · 400</div></div>
  <div class="row"><div class="body">Last ran 2 nights ago — applied 14 mm.</div><div class="tok">body / 14 · 400</div></div>
  <div class="row"><div class="body-sm">Window 00:00–10:00 · America/Edmonton</div><div class="tok">body-sm / 12 · 400</div></div>
  <div class="row"><div class="eyebrow">Active schedule</div><div class="tok">eyebrow / 11 · 500 · 0.14em</div></div>
</body></html>
