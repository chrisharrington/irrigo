<!doctype html>
<html><head>
<meta charset="utf-8">
<link rel="stylesheet" href="../colors_and_type.css">
<link rel="stylesheet" href="../components.css">
<link rel="stylesheet" href="_card.css">
<style>
  body.card { padding: 22px 24px; }
  .lbl { font: var(--num-sm); color: var(--fg-dim); text-transform: uppercase; letter-spacing: .12em; margin-bottom: 14px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .sched {
    border: 1px solid var(--border);
    background: var(--surface);
    border-radius: var(--r-3);
    padding: 16px;
    display: flex; flex-direction: column; gap: 8px;
    position: relative;
  }
  .sched.active {
    border-color: rgba(111,227,155,0.4);
    background: linear-gradient(180deg, rgba(111,227,155,0.05), rgba(111,227,155,0) 70%), var(--surface);
    box-shadow: 0 0 0 1px rgba(111,227,155,0.18) inset;
  }
  .sched .nm { font: var(--h2); color: var(--fg); }
  .sched .meta { font: var(--body-sm); color: var(--fg-muted); }
  .sched .days { display: flex; gap: 4px; margin-top: 4px; }
  .sched .day {
    width: 26px; height: 26px;
    display: grid; place-items: center;
    border-radius: 4px;
    font: 500 11px/1 var(--font-mono);
    color: var(--fg-dim);
    background: var(--ink-300);
    border: 1px solid var(--border);
  }
  .sched .day.on {
    background: var(--accent);
    color: var(--on-accent);
    border-color: transparent;
  }
  .corner-chip {
    position: absolute; top: 12px; right: 12px;
  }
</style>
</head>
<body class="card">
  <div class="lbl">Schedule card — preset feels like a profile</div>
  <div class="grid">
    <div class="sched active">
      <span class="badge badge--active corner-chip"><span class="dot"></span>Active</span>
      <div class="nm">Maintenance</div>
      <div class="meta">Wed · Fri · Sun · 00:00–10:00</div>
      <div class="days">
        <div class="day">M</div><div class="day">T</div><div class="day on">W</div>
        <div class="day">T</div><div class="day on">F</div><div class="day">S</div><div class="day on">S</div>
      </div>
    </div>
    <div class="sched">
      <span class="badge corner-chip">Switch</span>
      <div class="nm">Overseeding</div>
      <div class="meta">Daily · 02:00–08:00 · shallow roots</div>
      <div class="days">
        <div class="day on">M</div><div class="day on">T</div><div class="day on">W</div>
        <div class="day on">T</div><div class="day on">F</div><div class="day on">S</div><div class="day on">S</div>
      </div>
    </div>
  </div>
</body></html>
