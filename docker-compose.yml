networks:
    backend:
        name: irrigo_backend
        driver: bridge
        internal: true
    frontend:
        name: irrigo_frontend
        driver: bridge

services:
    db:
        image: postgres:17
        container_name: irrigo_db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER:-postgres}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
            POSTGRES_DB: ${POSTGRES_DB:-irrigation}
        expose:
            - "5432"
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1",
                ]
            interval: 5s
            timeout: 5s
            retries: 20
        networks:
            - backend

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: irrigo_api
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./api:/app
            - /app/node_modules
        environment:
            NODE_ENV: ${NODE_ENV:-production}
            PORT: ${PORT:-9753}
            DATABASE_URL: ${DATABASE_URL:-postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-irrigation}}
            HA_URL: ${HA_URL:-}
            HA_TOKEN: ${HA_TOKEN:-}
            HA_RETRY_MAX: ${HA_RETRY_MAX:-3}
            HA_RETRY_BASE_MS: ${HA_RETRY_BASE_MS:-1000}
            HA_NOTIFY_SERVICE: ${HA_NOTIFY_SERVICE:-}
            NOTIFY_ON_SCHEDULE_START: ${NOTIFY_ON_SCHEDULE_START:-true}
            NOTIFY_ON_SCHEDULE_END: ${NOTIFY_ON_SCHEDULE_END:-true}
            NOTIFY_ON_WATERING_START: ${NOTIFY_ON_WATERING_START:-false}
            NOTIFY_ON_WATERING_END: ${NOTIFY_ON_WATERING_END:-false}
            NOTIFY_ON_ERROR: ${NOTIFY_ON_ERROR:-true}
            DRY_RUN: ${DRY_RUN:-false}
        ports:
            - "${PORT:-9753}:9753"
        command: sh -c "bun run start"
        networks:
            - backend
            - frontend

    # VS Code Dev Container — editor host that VS Code's Dev Containers
    # extension attaches to. Runs `sleep infinity`; lifecycle independent from
    # the `api` service so editor sessions survive api restarts.
    dev:
        build:
            context: .
            dockerfile: Dockerfile.dev
            args:
                DEV_USER: ${DEV_USER:-chrisharrington}
                DEV_UID: ${DEV_UID:-1000}
                DEV_GID: ${DEV_GID:-1000}
        container_name: irrigo_dev
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        volumes:
            # Whole repo bind-mounted so the editor sees api/, app/, shared/.
            - .:/app
            # Shared with host so Claude sessions inside the container see the
            # same skills/commands and can write auth, history, and session
            # state back. Same path on both sides because DEV_USER aligns.
            - ${HOME}/.claude:/home/${DEV_USER:-chrisharrington}/.claude
            # User-scope MCP server config lives here (not under .claude/), so
            # mount it explicitly to expose host-registered MCP servers inside
            # the container. Read-write because Claude Code updates it.
            - ${HOME}/.claude.json:/home/${DEV_USER:-chrisharrington}/.claude.json
            # Share the host's gh CLI auth so `gh` works without re-login.
            - ${HOME}/.config/gh:/home/${DEV_USER:-chrisharrington}/.config/gh
            # Share the host's git identity (user.name, user.email, signing
            # keys, aliases) so commits made inside the container are
            # attributed correctly without per-container configuration.
            - ${HOME}/.gitconfig:/home/${DEV_USER:-chrisharrington}/.gitconfig:ro
            # Gradle build cache + wrapper dists. Survives image rebuilds so
            # the first `expo run:android` after a rebuild doesn't re-fetch
            # the entire AGP/Kotlin/RN toolchain from Maven.
            - irrigo-gradle:/home/${DEV_USER:-chrisharrington}/.gradle
            # ADB keys + auth state. Persists the "always allow from this
            # computer" approval the phone grants on first connect.
            - irrigo-android:/home/${DEV_USER:-chrisharrington}/.android
        networks:
            # backend → reach the `db` container.
            # frontend → outbound internet for bun install, gh, etc.
            - backend
            - frontend

    # Metro bundler — long-running Expo dev server so the phone dev build can
    # connect any time without anyone manually starting Metro in a terminal.
    # Shares the dev image (already has bun + node); reads the bind-mounted
    # repo so file changes trigger hot reload like a local Metro would.
    metro:
        build:
            context: .
            dockerfile: Dockerfile.dev
            args:
                DEV_USER: ${DEV_USER:-chrisharrington}
                DEV_UID: ${DEV_UID:-1000}
                DEV_GID: ${DEV_GID:-1000}
        container_name: irrigo_metro
        restart: unless-stopped
        working_dir: /app/app
        environment:
            # Metro auto-detects a "LAN IP" to embed in bundle/asset URLs;
            # inside the container it picks the docker bridge IP (172.x.x.x)
            # which the phone can't reach. Forcing the host's LAN address
            # makes the URLs the phone receives actually resolve.
            REACT_NATIVE_PACKAGER_HOSTNAME: ${METRO_HOST:-192.168.2.100}
        volumes:
            - .:/app
        ports:
            - "9097:9097"
        command: bunx expo start --dev-client --port 9097
        networks:
            - frontend

    pgadmin:
        image: dpage/pgadmin4:8
        container_name: irrigo_pgadmin
        profiles: ["tools"]
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@example.com}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:-admin}
        ports:
            - "${PGADMIN_PORT:-9754}:80"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - backend
            - frontend

volumes:
    db-data:
    irrigo-gradle:
    irrigo-android:
