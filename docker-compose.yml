networks:
    backend:
        driver: bridge
        internal: true
    frontend:
        driver: bridge

services:
    db:
        image: postgres:17
        container_name: ${COMPOSE_PROJECT_NAME}-db
        restart: unless-stopped
        environment:
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
            POSTGRES_DB: ${POSTGRES_DB}
        expose:
            - "5432"
        volumes:
            - db-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB -h 127.0.0.1",
                ]
            interval: 5s
            timeout: 5s
            retries: 20
        networks:
            - backend

    api:
        build:
            context: ./api
            dockerfile: Dockerfile
        container_name: ${COMPOSE_PROJECT_NAME}-api
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        volumes:
            - ./api:/app
            - /app/node_modules
        environment:
            NODE_ENV: ${NODE_ENV}
            PORT: ${PORT}
            DATABASE_URL: ${DATABASE_URL}
            HA_URL: ${HA_URL}
            HA_TOKEN: ${HA_TOKEN}
            HA_RETRY_MAX: ${HA_RETRY_MAX}
            HA_RETRY_BASE_MS: ${HA_RETRY_BASE_MS}
            HA_NOTIFY_SERVICE: ${HA_NOTIFY_SERVICE}
            NOTIFY_ON_SCHEDULE_START: ${NOTIFY_ON_SCHEDULE_START}
            NOTIFY_ON_SCHEDULE_END: ${NOTIFY_ON_SCHEDULE_END}
            NOTIFY_ON_WATERING_START: ${NOTIFY_ON_WATERING_START}
            NOTIFY_ON_WATERING_END: ${NOTIFY_ON_WATERING_END}
            NOTIFY_ON_ERROR: ${NOTIFY_ON_ERROR}
            DRY_RUN: ${DRY_RUN}
            EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN}
        ports:
            - "${PORT}:9753"
        command: sh -c "bun run dev"
        networks:
            - backend
            - frontend

    # VS Code Dev Container — editor host that VS Code's Dev Containers
    # extension attaches to. Runs `sleep infinity`; lifecycle independent from
    # the `api` service so editor sessions survive api restarts.
    dev:
        build:
            context: .
            dockerfile: Dockerfile.dev
            args:
                DEV_USER: ${DEV_USER}
                DEV_UID: ${DEV_UID}
                DEV_GID: ${DEV_GID}
        container_name: ${COMPOSE_PROJECT_NAME}-dev
        restart: unless-stopped
        depends_on:
            db:
                condition: service_healthy
        volumes:
            # Whole repo bind-mounted so the editor sees api/, app/, shared/.
            - .:/app
            # Anonymous volumes overlay the bind mount so the api/ and app/
            # node_modules baked into the image survive instead of being
            # shadowed by the host's empty (or absent) node_modules dirs.
            # Same overlay trick the api service uses for /app/node_modules.
            - /app/api/node_modules
            - /app/app/node_modules
            # Shared with host so Claude sessions inside the container see the
            # same skills/commands and can write auth, history, and session
            # state back. Same path on both sides because DEV_USER aligns.
            - ${HOME}/.claude:/home/${DEV_USER}/.claude
            # User-scope MCP server config lives here (not under .claude/), so
            # mount it explicitly to expose host-registered MCP servers inside
            # the container. Read-write because Claude Code updates it.
            - ${HOME}/.claude.json:/home/${DEV_USER}/.claude.json
            # Share the host's gh CLI auth so `gh` works without re-login.
            - ${HOME}/.config/gh:/home/${DEV_USER}/.config/gh
            # Share the host's git identity (user.name, user.email, signing
            # keys, aliases) so commits made inside the container are
            # attributed correctly without per-container configuration.
            - ${HOME}/.gitconfig:/home/${DEV_USER}/.gitconfig:ro
            # Worktree git pointer resolution: when this stack is a git
            # worktree, /app/.git is a pointer file referencing the primary
            # checkout's .git directory at an absolute host path. Mount that
            # directory at the same path inside the container so `git` can
            # follow the gitdir/commondir chain. Harmless when the stack is
            # the primary checkout — the mount target is the same .git that
            # /app/.git already is. Path is host-specific; set PRIMARY_GIT_DIR
            # in `.env` (see `.env.example`).
            - ${PRIMARY_GIT_DIR}:${PRIMARY_GIT_DIR}
            # Gradle build cache + wrapper dists. Survives image rebuilds so
            # the first `expo run:android` after a rebuild doesn't re-fetch
            # the entire AGP/Kotlin/RN toolchain from Maven.
            - irrigo-gradle:/home/${DEV_USER}/.gradle
            # ADB keys + auth state. Persists the "always allow from this
            # computer" approval the phone grants on first connect.
            - irrigo-android:/home/${DEV_USER}/.android
            # VS Code Server install (binaries, extensions, workspace state).
            # Lives only in the container's writable layer by default, so every
            # recreate makes VS Code re-prompt to install extensions like
            # Claude Code. Per-stack volume — auto-namespaced by Compose so
            # each worktree gets its own isolated VS Code Server state.
            - vscode-server:/home/${DEV_USER}/.vscode-server
        networks:
            # backend → reach the `db` container.
            # frontend → outbound internet for bun install, gh, etc.
            - backend
            - frontend

    # Metro bundler — long-running Expo dev server so the phone dev build can
    # connect any time without anyone manually starting Metro in a terminal.
    # Shares the dev image (already has bun + node); reads the bind-mounted
    # repo so file changes trigger hot reload like a local Metro would.
    metro:
        build:
            context: .
            dockerfile: Dockerfile.metro
            args:
                DEV_USER: ${DEV_USER}
                DEV_UID: ${DEV_UID}
                DEV_GID: ${DEV_GID}
        container_name: ${COMPOSE_PROJECT_NAME}-metro
        restart: unless-stopped
        working_dir: /app/app
        environment:
            # Metro auto-detects a "LAN IP" to embed in bundle/asset URLs;
            # inside the container it picks the docker bridge IP (172.x.x.x)
            # which the phone can't reach. Forcing the host's LAN address
            # makes the URLs the phone receives actually resolve.
            REACT_NATIVE_PACKAGER_HOSTNAME: ${METRO_HOST}
        volumes:
            - .:/app
            # Anonymous volume preserves the app/node_modules baked into the
            # metro image under the .:/app bind mount.
            - /app/app/node_modules
        ports:
            - "${METRO_PORT}:${METRO_PORT}"
        command: bunx expo start --dev-client --port ${METRO_PORT}
        networks:
            - frontend

    pgadmin:
        image: dpage/pgadmin4:8
        container_name: ${COMPOSE_PROJECT_NAME}-pgadmin
        profiles: ["tools"]
        restart: unless-stopped
        environment:
            PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
            PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
        ports:
            - "${PGADMIN_PORT}:80"
        depends_on:
            db:
                condition: service_healthy
        networks:
            - backend
            - frontend

volumes:
    # Per-stack: Compose auto-namespaces with COMPOSE_PROJECT_NAME so each
    # worktree gets its own Postgres data volume.
    db-data:
    # Per-stack: VS Code Server binaries, extensions, and workspace state.
    # Persists across container recreates so VS Code doesn't re-install
    # extensions every time the dev container is rebuilt.
    vscode-server:
    # Shared across all worktrees: Android toolchain cache + ADB pairing
    # state. Re-fetching the AGP/Kotlin/RN toolchain from Maven or re-pairing
    # the phone on every fresh stack is ~10 min of pain, so these volumes are
    # external (created once on the host) and referenced by literal name.
    # One-time setup:
    #     docker volume create irrigo-gradle
    #     docker volume create irrigo-android
    irrigo-gradle:
        external: true
    irrigo-android:
        external: true
